<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Photo Scroller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background layers for smooth cross-fading -->
    <div id="background-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <!-- Gradient overlay: solid black bottom-left to clear -->
    <div class="gradient-overlay"></div>

    <!-- Scrolling photo container -->
    <div id="scroller-viewport">
        <div id="photo-track">
            <!-- Photos will be injected by JavaScript or manually listed -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
