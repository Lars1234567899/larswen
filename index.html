<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Showcase</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Background Layers */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
            filter: blur(5px) brightness(0.6); /* Slightly dimmed for text readability */
        }

        .bg-layer.active { opacity: 1; }

        /* The Gradient: Solid black bottom-left */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,0.8) 30%, 
                rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* Main Content Layout */
        .main-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            padding: 0 10%;
            box-sizing: border-box;
            align-items: center;
        }

        /* Text Section (On the left) */
        .text-content {
            flex: 1;
            z-index: 10;
            padding-right: 50px;
        }

        .text-content h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .text-content p {
            font-size: 1.2rem;
            max-width: 400px;
            line-height: 1.6;
            opacity: 0.8;
        }

        #current-caption {
            font-weight: bold;
            color: #ff3e3e; /* Accent color */
            margin-top: 20px;
            display: block;
            font-size: 1.5rem;
        }

        /* Scroller Section (On the right) */
        .scroller-section {
            flex: 1;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #photo-track {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 150px; /* 150px gap requested */
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .photo-item {
            height: 60vh;
            width: auto;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <div class="gradient-overlay"></div>

    <div class="main-layout">
        <!-- Added Text Section -->
        <div class="text-content">
            <h1>Discovery</h1>
            <p>Explore the world through our curated collection of perspectives. Every five seconds, a new story begins.</p>
            <span id="current-caption">IMAGE 01</span>
        </div>

        <!-- The Scroller -->
        <div class="scroller-section">
            <div id="photo-track">
                <!-- Photos go here -->
            </div>
        </div>
    </div>

    <script>
        const galleryData = [
            { url: "https://picsum.photos/id/10/1200/800", title: "THE HIGHLANDS" },
            { url: "https://picsum.photos/id/20/1200/800", title: "URBAN DEPTH" },
            { url: "https://picsum.photos/id/30/1200/800", title: "NATURE'S ECHO" },
            { url: "https://picsum.photos/id/40/1200/800", title: "WILDERNESS" },
            { url: "https://picsum.photos/id/50/1200/800", title: "MISTY PEAKS" },
            { url: "https://picsum.photos/id/60/1200/800", title: "QUIET MOMENTS" },
            { url: "https://picsum.photos/id/70/1200/800", title: "STREET LIGHTS" },
            { url: "https://picsum.photos/id/80/1200/800", title: "DREAMSCAPES" },
            { url: "https://picsum.photos/id/90/1200/800", title: "OCEAN BLUE" },
            { url: "https://picsum.photos/id/100/1200/800", title: "FINAL FRONTIER" }
        ];

        const track = document.getElementById('photo-track');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        const caption = document.getElementById('current-caption');

        let currentIndex = 0;
        let activeBg = bg1;

        // Initialize photos
        galleryData.forEach(item => {
            const img = document.createElement('img');
            img.src = item.url;
            img.className = 'photo-item';
            track.appendChild(img);
        });

        function updateGallery() {
            const photos = document.querySelectorAll('.photo-item');
            const photoHeight = photos[0].offsetHeight;
            const gap = 150;
            
            // 1. Scroll photo
            const offset = currentIndex * (photoHeight + gap);
            track.style.transform = `translateY(-${offset}px)`;

            // 2. Change background image + Fade
            const nextBg = (activeBg === bg1) ? bg2 : bg1;
            nextBg.style.backgroundImage = `url('${galleryData[currentIndex].url}')`;
            
            activeBg.classList.remove('active');
            nextBg.classList.add('active');
            activeBg = nextBg;

            // 3. Update Text Caption
            caption.innerText = galleryData[currentIndex].title;

            currentIndex = (currentIndex + 1) % galleryData.length;
        }

        window.addEventListener('load', () => {
            updateGallery();
            setInterval(updateGallery, 5000); // 5 seconds interval
        });
    </script>
</body>
</html>
