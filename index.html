<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Photo Wheel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap');

        :root {
            --photo-height: 60vh;
            --gap: 150px;
            --total-item-height: calc(var(--photo-height) + var(--gap));
            --scroll-speed: 50s; /* 5 seconds per image x 10 images */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .loader-text { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 5px; margin-bottom: 20px; }
        .bar-container { width: 150px; height: 1px; background: rgba(255,255,255,0.1); }
        #progress-bar { height: 100%; background: #fff; width: 0%; transition: width 0.4s; }

        /* --- BACKGROUND LAYERS --- */
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: opacity 2s ease-in-out; opacity: 0;
        }
        .bg-layer.active { opacity: 0.5; }

        /* --- GRADIENT (Bottom-Left Black) --- */
        .gradient-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(45deg, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,0.8) 30%, 
                rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* --- HEADER & FOOTER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 40px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 2px; }
        footer {
            position: fixed; bottom: 0; width: 100%; padding: 30px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5;
        }

        /* --- LAYOUT --- */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            height: 100vh;
            padding: 0 60px;
            align-items: center;
        }

        /* Steady Text */
        .steady-text { z-index: 10; max-width: 500px; }
        .steady-text h1 { font-family: 'Playfair Display', serif; font-size: 4rem; line-height: 1.1; margin-bottom: 20px; }
        .steady-text p { font-size: 1rem; line-height: 1.8; color: #aaa; }

        /* CONTINUOUS WHEEL SCROLLER */
        .scroller-window {
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #photo-track {
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            animation: scrollWheel var(--scroll-speed) linear infinite;
        }

        .photo-item {
            height: var(--photo-height);
            width: auto;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        @keyframes scrollWheel {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(-10 * var(--total-item-height))); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">LOADING</div>
        <div class="bar-container"><div id="progress-bar"></div></div>
    </div>

    <header>
        <div class="logo">JOURNAL.</div>
        <div style="font-size: 0.7rem; letter-spacing: 3px;">MENU</div>
    </header>

    <div id="bg-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <div class="gradient-overlay"></div>

    <div class="main-content">
        <div class="steady-text">
            <h1>The Eternal<br>Collection</h1>
            <p>A continuous loop of visual storytelling. This collection remains steady while the world moves around it, capturing moments that never truly end.</p>
        </div>

        <div class="scroller-window">
            <div id="photo-track">
                <!-- Images will be duplicated for seamless loop -->
            </div>
        </div>
    </div>

    <footer>
        <div>EST. 2024</div>
        <div>SCROLLING CONTINUOUSLY</div>
    </footer>

    <script>
        const images = [
            "https://picsum.photos/id/10/1200/1600",
            "https://picsum.photos/id/20/1200/1600",
            "https://picsum.photos/id/30/1200/1600",
            "https://picsum.photos/id/40/1200/1600",
            "https://picsum.photos/id/50/1200/1600",
            "https://picsum.photos/id/61/1200/1600",
            "https://picsum.photos/id/62/1200/1600",
            "https://picsum.photos/id/63/1200/1600",
            "https://picsum.photos/id/64/1200/1600",
            "https://picsum.photos/id/65/1200/1600"
        ];

        const track = document.getElementById('photo-track');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        const pBar = document.getElementById('progress-bar');
        
        let loadedCount = 0;
        let bgIndex = 0;
        let activeBg = bg1;

        // Create the wheel (Original + Clone for seamless loop)
        function initGallery() {
            // Add original 10
            images.forEach(src => createImg(src));
            // Add clone of 10 to create infinite effect
            images.forEach(src => createImg(src));

            // Start background cycling
            cycleBackground();
            setInterval(cycleBackground, 5000);
        }

        function createImg(src) {
            const img = new Image();
            img.src = src;
            img.className = 'photo-item';
            track.appendChild(img);
            img.onload = () => {
                loadedCount++;
                pBar.style.width = (loadedCount / (images.length * 2)) * 100 + "%";
                if (loadedCount === images.length * 2) {
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => document.getElementById('loader').remove(), 1000);
                    }, 500);
                }
            };
        }

        function cycleBackground() {
            const nextBg = (activeBg === bg1) ? bg2 : bg1;
            nextBg.style.backgroundImage = `url('${images[bgIndex]}')`;
            
            activeBg.classList.remove('active');
            nextBg.classList.add('active');
            activeBg = nextBg;

            bgIndex = (bgIndex + 1) % images.length;
        }

        initGallery();
    </script>
</body>
</html>
