<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* --- LOADING SCREEN --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }
        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loader-text {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .progress-container {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
        }
        #progress-bar {
            position: absolute;
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.3s;
        }
        #percent-text {
            margin-top: 10px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.5;
        }

        /* --- BACKGROUND & GRADIENT --- */
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }
        .bg-layer.active { opacity: 0.5; }

        .gradient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,0.9) 25%, 
                rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        /* --- HEADER & FOOTER --- */
        header {
            position: fixed;
            top: 0; width: 100%; padding: 30px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
        nav ul { display: flex; list-style: none; gap: 40px; }
        nav a { color: #fff; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }

        footer {
            position: fixed;
            bottom: 0; width: 100%; padding: 20px 60px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; font-size: 0.7rem; letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        /* --- CONTENT --- */
        .main-container {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 100vh; padding: 0 80px; align-items: center;
        }
        .text-side { z-index: 10; }
        .text-side h2 { font-size: 0.9rem; color: #ff3e3e; letter-spacing: 5px; margin-bottom: 20px; }
        .text-side h1 { font-family: 'Playfair Display', serif; font-size: 4.5rem; line-height: 1.1; margin-bottom: 30px; }
        .text-side p { max-width: 400px; line-height: 1.8; color: #bbb; }

        .scroller-side {
            height: 100vh; display: flex; justify-content: flex-end; align-items: center; overflow: hidden;
        }
        #photo-track {
            display: flex; flex-direction: column; gap: 150px;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .photo-item {
            height: 65vh; width: auto; border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9); object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-text">LUMINA</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="percent-text">0%</div>
    </div>

    <header>
        <div class="logo">LUMINA.</div>
        <nav>
            <ul>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Exhibitions</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div id="bg-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <div class="gradient-overlay"></div>

    <div class="main-container">
        <div class="text-side">
            <h2 id="counter">Collection 01</h2>
            <h1 id="title">Ethereal<br>Landscapes</h1>
            <p id="desc">Capturing the silent whispers of nature in its purest form. A journey through light, shadow, and time.</p>
        </div>
        <div class="scroller-side">
            <div id="photo-track"></div>
        </div>
    </div>

    <footer>
        <div style="display:flex; gap:20px;">
            <span>Instagram</span><span>Behance</span>
        </div>
        <div>&copy; 2024 LUMINA PHOTOGRAPHY</div>
    </footer>

    <script>
        const gallery = [
            { url: "https://picsum.photos/id/10/1600/1000", title: "Mount<br>Echo", count: "Collection 01" },
            { url: "https://picsum.photos/id/20/1600/1000", title: "Urban<br>Solace", count: "Collection 02" },
            { url: "https://picsum.photos/id/30/1600/1000", title: "Nature's<br>Veil", count: "Collection 03" },
            { url: "https://picsum.photos/id/40/1600/1000", title: "Wild<br>Hearts", count: "Collection 04" },
            { url: "https://picsum.photos/id/50/1600/1000", title: "Silent<br>Peaks", count: "Collection 05" },
            { url: "https://picsum.photos/id/60/1600/1000", title: "Old<br>Woods", count: "Collection 06" },
            { url: "https://picsum.photos/id/70/1600/1000", title: "City<br>Lights", count: "Collection 07" },
            { url: "https://picsum.photos/id/80/1600/1000", title: "Deep<br>Blue", count: "Collection 08" },
            { url: "https://picsum.photos/id/90/1600/1000", title: "Golden<br>Fields", count: "Collection 09" },
            { url: "https://picsum.photos/id/100/1600/1000", title: "Lost<br>Horizon", count: "Collection 10" }
        ];

        const track = document.getElementById('photo-track');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        const titleEl = document.getElementById('title');
        const countEl = document.getElementById('counter');
        const loader = document.getElementById('loader');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('percent-text');

        let currentIndex = 0;
        let activeBg = bg1;
        let loadedCount = 0;

        // 1. PRELOAD IMAGES
        gallery.forEach((item, index) => {
            const img = new Image();
            img.src = item.url;
            
            // Add to scroller
            const scrollImg = document.createElement('img');
            scrollImg.src = item.url;
            scrollImg.className = 'photo-item';
            track.appendChild(scrollImg);

            img.onload = () => {
                loadedCount++;
                let percentage = Math.floor((loadedCount / gallery.length) * 100);
                pBar.style.width = percentage + '%';
                pText.innerText = percentage + '%';

                if (loadedCount === gallery.length) {
                    setTimeout(startGallery, 500);
                }
            };
        });

        function startGallery() {
            loader.classList.add('hidden');
            update();
            setInterval(update, 5000);
        }

        function update() {
            const photos = document.querySelectorAll('.photo-item');
            const h = photos[0].offsetHeight;
            const gap = 150;

            track.style.transform = `translateY(-${currentIndex * (h + gap)}px)`;

            const nextBg = (activeBg === bg1) ? bg2 : bg1;
            nextBg.style.backgroundImage = `url('${gallery[currentIndex].url}')`;
            
            activeBg.classList.remove('active');
            nextBg.classList.add('active');
            activeBg = nextBg;

            titleEl.innerHTML = gallery[currentIndex].title;
            countEl.innerText = gallery[currentIndex].count;

            currentIndex = (currentIndex + 1) % gallery.length;
        }
    </script>
</body>
</html>
