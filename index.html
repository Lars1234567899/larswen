<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Photo Gallery</title>
    <style>
        /* CSS STYLES */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Hide scrollbars */
            background-color: black;
            font-family: sans-serif;
        }

        /* Dual background layers for smooth cross-fading */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }

        .bg-layer.active {
            opacity: 1;
        }

        /* Gradient Overlay: Solid black bottom-left, fading to clear */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(35deg, 
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,0.9) 25%, 
                rgba(0,0,0,0) 65%);
            pointer-events: none;
        }

        /* Scroller Layout */
        #scroller-viewport {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #photo-track {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 150px; /* 150px gap between photos */
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .photo-item {
            height: 70vh; /* Make photos large enough to be the focal point */
            width: auto;
            max-width: 85%;
            border-radius: 4px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Background for cross-fading -->
    <div id="bg-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <!-- The black gradient overlay -->
    <div class="gradient-overlay"></div>

    <!-- Centered viewport for scrolling images -->
    <div id="scroller-viewport">
        <div id="photo-track">
            <!-- Photos will be generated by JavaScript -->
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const imageUrls = [
            "https://picsum.photos/id/10/1600/900",
            "https://picsum.photos/id/20/1600/900",
            "https://picsum.photos/id/30/1600/900",
            "https://picsum.photos/id/40/1600/900",
            "https://picsum.photos/id/50/1600/900",
            "https://picsum.photos/id/60/1600/900",
            "https://picsum.photos/id/70/1600/900",
            "https://picsum.photos/id/80/1600/900",
            "https://picsum.photos/id/90/1600/900",
            "https://picsum.photos/id/100/1600/900"
        ];

        const track = document.getElementById('photo-track');
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');

        let currentIndex = 0;
        let activeBg = bg1;

        // 1. Create the photo items
        imageUrls.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'photo-item';
            track.appendChild(img);
        });

        function updateGallery() {
            const photos = document.querySelectorAll('.photo-item');
            if (photos.length === 0) return;

            // 2. Calculate the scroll position
            // Distance = height of one photo + the 150px gap
            const photoHeight = photos[0].offsetHeight;
            const gap = 150;
            const moveDistance = currentIndex * (photoHeight + gap);

            // Move the track upwards
            track.style.transform = `translateY(-${moveDistance}px)`;

            // 3. Update the background with a cross-fade
            const nextBg = (activeBg === bg1) ? bg2 : bg1;
            nextBg.style.backgroundImage = `url('${imageUrls[currentIndex]}')`;
            
            // Toggle visibility
            activeBg.classList.remove('active');
            nextBg.classList.add('active');
            activeBg = nextBg;

            // 4. Move to next photo, loop back to start at the end
            currentIndex = (currentIndex + 1) % imageUrls.length;
        }

        // Run initially
        window.addEventListener('load', () => {
            updateGallery();
            // Change every 5 seconds
            setInterval(updateGallery, 5000);
        });
    </script>
</body>
</html>
